<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Command Center</title>
    <script>
      // GH Pages SPA redirect — rewrite 404 URLs into the hash-preserved form
      // the root index.html expects, then go to /command-center/.
      var pathSegmentsToKeep = 1; // preserve /command-center
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
